<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panadería - Grano Urbano</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <section class="pan-hero">
        <div class="pan-hero-overlay">
            <p class="sub-title">FRESHLY BAKED</p>
            <h1>Descubre el mejor sabor de nuestros  pasteles </h1>
        </div>
    </section>

    <section class="pan-categories">
        <h2>Categorias </h2>
        <div class="circle-grid">
            <div class="circle-item">
                <div class="img-frame"><img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=200&auto=format&fit=crop" alt="Pan Dulce"></div>
                <span>Pan Dulce</span>
            </div>
            <div class="circle-item">
                <div class="img-frame"><img src="https://images.unsplash.com/photo-1555507036-ab1f4038808a?q=80&w=200&auto=format&fit=crop" alt="Rústicos"></div>
                <span>Rústicos</span>
            </div>
            <div class="circle-item">
                <div class="img-frame"><img src="https://images.unsplash.com/photo-1608198093002-ad4e005484ec?q=80&w=300" alt="Baguettes"></div>
                <span>Baguettes</span>
            </div>
            <div class="circle-item">
                <div class="img-frame"><img src="https://images.unsplash.com/photo-1555507036-ab1f4038808a?q=80&w=200&auto=format&fit=crop" alt="Donas"></div>
                <span>Donas</span>
            </div>
            <div class="circle-item">
                <div class="img-frame"><img src="https://images.unsplash.com/photo-1517433367423-c7e5b0f35086?q=80&w=200&auto=format&fit=crop" alt="Galletas"></div>
                <span>Galletas</span>
            </div>
        </div>
    </section>

    <section class="new-products-section">
        <h2>Nuevos Productos</h2>
        <div class="products-container">
            <article class="pan-card">
                <img src="https://images.unsplash.com/photo-1517433367423-c7e5b0f35086?q=80&w=200&auto=format&fit=crop" alt="Galletas" alt="Producto">
                <h4>Galleta de Chispas</h4>
                <p class="price">$25.00</p>
                <button class="btn-add">Comprar</button>
            </article>
            <article class="pan-card">
                <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=300" alt="Producto">
                <h4>Pan de Trigo</h4>
                <p class="price">$45.00</p>
                <button class="btn-add">Comprar</button>
            </article>
            <article class="pan-card">
                <img src="https://images.unsplash.com/photo-1608198093002-ad4e005484ec?q=80&w=300" alt="Producto">
                <h4>Muffin Arándano</h4>
                <p class="price">$35.00</p>
                <button class="btn-add">Comprar</button>
            </article>
             <article class="pan-card">
                <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=300" alt="Producto">
                <h4>Pan de maiz </h4>
                <p class="price">$50.00</p>
                <button class="btn-add">Comprar</button>
            </article>
        </div>
    </section>

</body>
</html>
